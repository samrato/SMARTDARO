version: '3.8'

services:
  api:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URL=mongodb://db:27017/smartdaro
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/smartdaro
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretjwtkeyforproduction_change_me
    depends_on:
      - db
      - postgres
      - redis
    restart: always

  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smartdaro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo-data:
  postgres-data:

